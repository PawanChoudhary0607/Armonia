name: armonia
description: A premium music streaming app built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local storage
  shared_preferences: ^2.3.3

  # Typography
  google_fonts: ^6.2.1

  # UI
  cupertino_icons: ^1.0.8

  # Audio
  just_audio: ^0.9.43

  # YouTube stream extraction (PINNED — do not upgrade, v3 requires deno)
  youtube_explode_dart: 2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
